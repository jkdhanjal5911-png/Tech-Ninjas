<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Recommendation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow bg-dark">
  <div class="container">
    <h3 class="fw-bold text-white m-0">
      Smart Product Recommendation
    </h3>
  </div>
</nav>

<div class="sub-navbar py-3 shadow-sm">
  <div class="container">

    <div class="row justify-content-center mb-3">
      <div class="col-md-6">
        <input type="text" id="search" class="form-control search-box text-center" placeholder="🔍 Search product...">
      </div>
    </div>

    <div class="text-center">
      <button class="btn btn-dark m-1" onclick="filterCategory('All')">All</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Electronics')">Electronics</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Clothing')">Clothing</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Footwear')">Footwear</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Furniture')">Furniture</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Home')">Home</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Sports')">Sports</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Books')">Books</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Beauty')">Beauty</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Accessories')">Accessories</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Appliances')">Appliances</button>
      <button class="btn btn-outline-dark m-1" onclick="filterCategory('Stationery')">Stationery</button>
    </div>

  </div>
</div>

<div class="container mt-4">

<div class="container mt-3">
  <img 
    src="https://images.unsplash.com/photo-1523275335684-37898b6baf30"
    class="img-fluid rounded shadow"
    style="width:100%; height:300px; object-fit:cover;"
  >
</div>

<div class="row mt-3" id="productList"></div>

</div>

 
<script>
function displayProducts(list) {
    let html = "";
    list.forEach(p => {
        html += `
        <div class="col-md-3 mb-3">
            <div class="card p-2 text-center shadow">
                <img src="${p.image}" class="card-img-top" style="height:150px; object-fit:cover;">
                <div class="card-body">
                    <h6>${p.name}</h6>
                    <p>${p.category}</p>
                    <p>₹${p.price}</p>
                    <p>⭐ ${p.rating}</p>
                    <button class="btn btn-dark btn-sm" onclick="recommendProduct('${p.name}')">
                        Recommend
                    </button>
                </div>
            </div>
        </div>`;
    });
    document.getElementById("productList").innerHTML = html;
}

// Fetch products from Python backend
function fetchProducts(category="All", search="") {
    fetch("/get_products", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ category, search })
    })
    .then(res => res.json())
    .then(data => displayProducts(data));
}

// recommendation
function recommendProduct(productName) {
    fetch("/recommend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productName })
    })
    .then(res => res.json())
    .then(data => displayProducts(data));
}

// category filter
function filterCategory(cat) {
    let search = document.getElementById("search").value;
    fetchProducts(cat, search.toLowerCase());
}

// search
document.getElementById("search").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();
    let activeCategory = "All"; // You can add logic to track selected category
    fetchProducts(activeCategory, val);
});

// Load all products initially
fetchProducts();
</script>
</body>
</html>
