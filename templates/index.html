<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Recommendation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Product Recommendation</h3>
    <div class="row mt-3">
        <div class="col-md-4">
            <input type="text" id="category" class="form-control" placeholder="Enter category">
        </div>
        <div class="col-md-4">
            <input type="number" id="price" class="form-control" placeholder="Enter max price">
        </div>
        <div class="col-md-4">
            <button class="btn btn-dark" onclick="getRecommendations()">Search</button>
        </div>
    </div>
    <div class="row mt-4" id="productList"></div>
</div>

<script>
function getRecommendations() {
    const category = document.getElementById('category').value;
    const price = document.getElementById('price').value;

    fetch('/get_recommendations', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({category, price})
    })
    .then(res => res.json())
    .then(data => displayProducts(data))
}

function displayProducts(list) {
    let html = '';
    if(list.length === 0) {
        html = '<p>No products found.</p>';
    } else {
        list.forEach(p => {
            html += `<div class="col-md-3 mb-3">
                        <div class="card p-3">
                            <h6>${p.name}</h6>
                            <p>${p.category}</p>
                            <p class="price">₹${p.price}</p>
                        </div>
                    </div>`;
        });
    }
    document.getElementById('productList').innerHTML = html;
}
</script>
</body>
</html>
