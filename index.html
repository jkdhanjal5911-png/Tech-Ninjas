<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Recommendation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
<div class="container">
    <h4 class="text-white"> Product Recommendation</h4>
</div>
</nav>

<!-- Search -->
<div class="container mt-4">
    <input type="text" id="search" class="form-control" placeholder="Search product...">
</div>
<div class="container text-center mt-3">
    <button class="btn btn-dark m-1" onclick="filterCategory('All')">All</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Electronics')">Electronics</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Clothing')">Clothing</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Footwear')">Footwear</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Furniture')">Furniture</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Home')">Home</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Sports')">Sports</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Books')">Books</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Beauty')">Beauty</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Accessories')">Accessories</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Appliances')">Appliances</button>
    <button class="btn btn-outline-dark m-1" onclick="filterCategory('Stationery')">Stationery</button>
</div>

<div class="container mt-4">
    <div class="row" id="productList"></div>
</div>

<script>
const products = [
{ name:"Redmi Note 12",category:"Electronics",price:15000,rating:4.3 },
{ name:"Samsung Galaxy M34",category:"Electronics",price:18000,rating:4.4 },
{ name:"iPhone 13",category:"Electronics",price:60000,rating:4.7 },
{ name:"Boat Earbuds",category:"Electronics",price:1200,rating:4.2 },
{ name:"HP Laptop",category:"Electronics",price:55000,rating:4.5 },
{ name:"Dell Inspiron",category:"Electronics",price:62000,rating:4.6 },

{ name:"Men T-Shirt",category:"Clothing",price:500,rating:4.1 },
{ name:"Women Kurti",category:"Clothing",price:900,rating:4.3 },
{ name:"Men Jeans",category:"Clothing",price:1500,rating:4.2 },
{ name:"Saree Silk",category:"Clothing",price:2500,rating:4.5 },

{ name:"Nike Shoes",category:"Footwear",price:3500,rating:4.6 },
{ name:"Adidas Sneakers",category:"Footwear",price:4000,rating:4.5 },

{ name:"Study Table",category:"Furniture",price:4500,rating:4.3 },
{ name:"Office Chair",category:"Furniture",price:3500,rating:4.4 },

{ name:"Pressure Cooker",category:"Home",price:1800,rating:4.5 },

{ name:"Cricket Bat",category:"Sports",price:2500,rating:4.6 },
{ name:"Football",category:"Sports",price:800,rating:4.3 },

{ name:"Atomic Habits",category:"Books",price:500,rating:4.8 },

{ name:"Face Wash",category:"Beauty",price:200,rating:4.2 },

{ name:"Handbag",category:"Accessories",price:1500,rating:4.4 },

{ name:"Microwave",category:"Appliances",price:12000,rating:4.6 },

{ name:"Notebook",category:"Stationery",price:100,rating:4.5 }
];

function displayProducts(list) {
    let html = "";
    list.forEach(p => {
        html += `
        <div class="col-md-3 mb-3">
            <div class="card p-3">
                <h6>${p.name}</h6>
                <p>${p.category}</p>
                <p class="price">₹${p.price}</p>
                <p class="rating">⭐ ${p.rating}</p>
            </div>
        </div>`;
    });
    document.getElementById("productList").innerHTML = html;
}

function filterCategory(cat) {
    if(cat === "All") {
        displayProducts(products);
    } else {
        displayProducts(products.filter(p => p.category === cat));
    }
}

document.getElementById("search").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();
    displayProducts(products.filter(p => p.name.toLowerCase().includes(val)));
});

displayProducts (products);
</script>

</body>
</html>
